name: Run Jest Tests

on:
  - push
  - workflow_dispatch
  - pull_request

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@163217dfcd28294438ea1c1c149cfaf66eec283e # pin@v4

      - name: Install Dependencies
        run: npm install

      - name: Run Jest Tests
        run: npm test
