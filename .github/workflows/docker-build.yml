name: Build Docker Image

on:
  - push
  - workflow_dispatch
  - pull_request

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@163217dfcd28294438ea1c1c149cfaf66eec283e # pin@v4

      - name: Build Docker image
        run: docker build -t private-mirrors .
